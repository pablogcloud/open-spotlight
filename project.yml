name: OpenLauncher
options:
  bundleIdPrefix: org.openspotlight
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    DEVELOPMENT_TEAM: ""
targets:
  OpenLauncher:
    type: application
    platform: macOS
    sources:
      - path: OpenLauncher
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.openspotlight.app
        PRODUCT_NAME: "Open Spotlight"
        PRODUCT_MODULE_NAME: OpenLauncher
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: Open Spotlight
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: "Open Spotlight contributors"
        INFOPLIST_KEY_LSUIElement: true
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: false
        OTHER_LDFLAGS: "$(inherited) -lsqlite3"
    scheme:
      testTargets:
        - OpenLauncherTests
  OpenLauncherTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: OpenLauncherTests
    dependencies:
      - target: OpenLauncher
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.openspotlight.tests
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGNING_ALLOWED: false
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Open Spotlight.app/Contents/MacOS/Open Spotlight"
        BUNDLE_LOADER: "$(TEST_HOST)"
