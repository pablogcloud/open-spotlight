name: Feature request
description: Propose a scoped product or platform change
title: "feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user problem without prescribing an implementation.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy and permission impact
      description: Note any local files, provider payloads, network access, or executable access involved.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
