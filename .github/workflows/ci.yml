name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: macos-15
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Record toolchain
        run: swift --version

      - name: Check formatting
        run: swift format lint --recursive OpenLauncher OpenLauncherTests Package.swift

      - name: Run Swift package tests
        run: swift test

      - name: Install pinned XcodeGen
        run: |
          curl -fsSL \
            -o "$RUNNER_TEMP/xcodegen.zip" \
            https://github.com/yonaskolb/XcodeGen/releases/download/2.44.1/xcodegen.zip
          echo "a2e905fb68446e9bb4008cdfe2e13e3f176d0cbcca828b71770f8e53fca91b73  $RUNNER_TEMP/xcodegen.zip" \
            | shasum -a 256 -c -
          ditto -x -k "$RUNNER_TEMP/xcodegen.zip" "$RUNNER_TEMP/xcodegen"
          echo "$RUNNER_TEMP/xcodegen/xcodegen/bin" >> "$GITHUB_PATH"

      - name: Regenerate Xcode project
        run: xcodegen generate

      - name: Verify generated project is committed
        run: git diff --exit-code -- OpenLauncher.xcodeproj

      - name: Build Debug app
        run: >-
          xcodebuild -project OpenLauncher.xcodeproj -scheme OpenLauncher
          -configuration Debug CODE_SIGNING_ALLOWED=NO build

      - name: Build Release app
        run: >-
          xcodebuild -project OpenLauncher.xcodeproj -scheme OpenLauncher
          -configuration Release CODE_SIGNING_ALLOWED=NO build
